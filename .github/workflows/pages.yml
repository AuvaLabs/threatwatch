name: Deploy GitHub Pages

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch:           # manual trigger

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch live data from VPS
        run: |
          mkdir -p data/output
          curl -sf https://threatwatch.auvalabs.com/api/articles -o data/output/daily_latest.json || echo '[]' > data/output/daily_latest.json
          curl -sf https://threatwatch.auvalabs.com/api/stats   -o data/output/run_stats.json    || true

      - name: Build static site
        run: python scripts/deploy_gh_pages.py

      - name: Commit and push if changed
        run: |
          git config user.name  "nicholai.me"
          git config user.email "51435592+CyberOneHQ@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet docs/ && echo "No changes" && exit 0
          git commit -m "data: update threat intel feed - $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
