# Feed discovery sources — used by scripts/discover_feeds.py
# Each entry is an OPML file or plaintext URL list that aggregates security RSS feeds.
# The script parses these, cross-references against existing config, validates live,
# and writes candidates to data/state/feed_candidates.yaml for human review.
#
# Format:
#   - url: <URL>        # OPML file or plaintext (one URL per line)
#     format: opml      # opml | txt
#     label: <label>    # human label for the source

sources:
  # Curated security blog / threat intel OPML lists on GitHub
  - url: "https://raw.githubusercontent.com/nicehash/nicehash-blog/master/feeds.opml"
    format: opml
    label: "NiceHash security feeds"

  - url: "https://raw.githubusercontent.com/AboutSecurity/Threat-Intelligence-RSS-Feeds/main/feeds.opml"
    format: opml
    label: "Threat Intelligence RSS Feeds"

  - url: "https://raw.githubusercontent.com/hslatman/awesome-threat-intelligence/master/README.md"
    format: txt_urls
    label: "Awesome Threat Intelligence (URL extraction)"

  # MISP galaxy and project feed references
  - url: "https://raw.githubusercontent.com/MISP/misp-book/main/using-the-system/README.md"
    format: txt_urls
    label: "MISP project resources"

# Manual candidate seeds — URLs to test even if not in any aggregator source.
# Add feeds here that you want evaluated and potentially added to the config.
