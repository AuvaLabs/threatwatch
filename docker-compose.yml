services:
  pipeline:
    build: .
    container_name: threatwatch-pipeline
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - SITE_DOMAIN=${SITE_DOMAIN:-localhost:8098}
      - FEED_CUTOFF_DAYS=${FEED_CUTOFF_DAYS:-7}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_MODEL=${LLM_MODEL:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-auto}
      # AI enrichment runs out-of-band by default (every 3rd pipeline tick,
      # i.e. every 30 min) so Groq rate limits don't block fetch ingestion.
      # Set AI_ENRICHMENT_INLINE=1 to run AI on every pipeline tick (legacy).
      - AI_ENRICHMENT_INLINE=${AI_ENRICHMENT_INLINE:-0}
      - AI_ENRICHMENT_EVERY=${AI_ENRICHMENT_EVERY:-3}
      - LLM_TIMEOUT=${LLM_TIMEOUT:-30}
      - LLM_CIRCUIT_THRESHOLD=${LLM_CIRCUIT_THRESHOLD:-3}
      - WEBHOOK_URL=${WEBHOOK_URL:-}
      - WEBHOOK_MIN_CONF=${WEBHOOK_MIN_CONF:-80}
      - NEWSAPI_KEY=${NEWSAPI_KEY:-}
      - NEWSAPI_INTERVAL=${NEWSAPI_INTERVAL:-1800}
    volumes:
      - threatwatch-data:/app/data
    healthcheck:
      # Use scheduler heartbeat (touched every loop tick) instead of stats.json
      # mtime. Individual pipeline runs can take 30+ min with LLM briefing work,
      # which exceeds the old 25-min threshold and causes false-negative unhealthy.
      # Heartbeat threshold: 1800s = 30min (PIPELINE_INTERVAL default 600s + margin).
      test:
        - "CMD-SHELL"
        - "python3 -c \"import os,sys,time; h='/app/data/state/scheduler_heartbeat.txt'; s='/app/data/output/stats.json'; sys.exit(0 if (os.path.exists(h) and (time.time()-os.path.getmtime(h))<1800) or (os.path.exists(s) and (time.time()-os.path.getmtime(s))<1800) else 1)\""
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 180s
    command: ["python", "scripts/run_pipeline.py"]

  server:
    build: .
    container_name: threatwatch-server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=${PORT:-8098}
      - SITE_DOMAIN=${SITE_DOMAIN:-localhost:8098}
      - READ_FROM_SQLITE=1
    ports:
      - "${PORT:-8098}:8098"
    volumes:
      - threatwatch-data:/app/data
    depends_on:
      pipeline:
        # service_started (not service_healthy) so the dashboard stays up while
        # the pipeline is mid-fetch. The server gracefully degrades when
        # stats.json is missing (/api/stats returns {} rather than 500).
        condition: service_started
    healthcheck:
      # /api/health returns `status: ok|degraded|stale` from real signals; a
      # `stale` (last-run > 25 min old) should not fail the server itself —
      # the homepage still renders — so we only require HTTP 200 on /.
      test: ["CMD", "curl", "-f", "http://localhost:8098/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    command: ["python", "serve_threatwatch.py"]

volumes:
  threatwatch-data:
