  <text x="570" y="215" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="8" fill="#3a4a6a">fetch &#x2192; normalize &#x2192; deduplicate &#x2192; classify &#x2192; enrich &#x2192; persist</text>
  <text x="570" y="232" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="8" fill="#2a3a5a">Python 3.x  |  feedparser  |  newspaper3k  |  jinja2</text>

