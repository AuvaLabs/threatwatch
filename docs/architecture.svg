    <line x1="0" y1="280" x2="1200" y2="280" stroke-width="0.5"/><line x1="0" y1="320" x2="1200" y2="320" stroke-width="0.5"/>
    <line x1="0" y1="360" x2="1200" y2="360" stroke-width="0.5"/><line x1="0" y1="400" x2="1200" y2="400" stroke-width="0.5"/>
    <line x1="0" y1="440" x2="1200" y2="440" stroke-width="0.5"/><line x1="0" y1="480" x2="1200" y2="480" stroke-width="0.5"/>
