    <line x1="960" y1="0" x2="960" y2="600" stroke-width="0.5"/><line x1="1000" y1="0" x2="1000" y2="600" stroke-width="0.5"/>
    <line x1="1040" y1="0" x2="1040" y2="600" stroke-width="0.5"/><line x1="1080" y1="0" x2="1080" y2="600" stroke-width="0.5"/>
